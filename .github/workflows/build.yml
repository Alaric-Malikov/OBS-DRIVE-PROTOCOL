name: Build Thumb Drive Launcher

on:
  push:
    branches: [main, master]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  # ── Windows build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django>=4.2" pyinstaller

      - name: Build filemanager.exe
        working-directory: thumb-drive-launcher/app/filemanager
        run: pyinstaller filemanager.spec --noconfirm

      - name: Assemble Windows drive package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\windows\app\filemanager
          New-Item -ItemType Directory -Force -Path dist\windows\launcher

          Copy-Item -Recurse -Force `
            thumb-drive-launcher\app\filemanager\dist\filemanager\* `
            dist\windows\app\filemanager\

          Copy-Item -Force thumb-drive-launcher\launcher\*.bat  dist\windows\launcher\
          Copy-Item -Force thumb-drive-launcher\launcher\*.vbs  dist\windows\launcher\ -ErrorAction SilentlyContinue
          if (Test-Path thumb-drive-launcher\launcher\icon.ico) {
            Copy-Item -Force thumb-drive-launcher\launcher\icon.ico dist\windows\launcher\
          }
          Copy-Item -Force thumb-drive-launcher\autorun.inf dist\windows\
          Copy-Item -Force thumb-drive-launcher\README.txt  dist\windows\

      - name: Zip Windows package
        shell: pwsh
        run: |
          Compress-Archive -Path dist\windows\* `
            -DestinationPath dist\thumb-drive-launcher-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: thumb-drive-launcher-windows
          path: dist\thumb-drive-launcher-windows.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist\thumb-drive-launcher-windows.zip

  # ── Linux / ChromeOS build ─────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django>=4.2" pyinstaller

      - name: Build filemanager binary
        working-directory: thumb-drive-launcher/app/filemanager
        run: pyinstaller filemanager.spec --noconfirm

      - name: Assemble Linux drive package
        run: |
          mkdir -p dist/linux/app/filemanager
          mkdir -p dist/linux/launcher

          cp -r thumb-drive-launcher/app/filemanager/dist/filemanager/. \
                dist/linux/app/filemanager/

          cp thumb-drive-launcher/launcher/*.sh  dist/linux/launcher/
          cp thumb-drive-launcher/launcher/*.bat dist/linux/launcher/
          cp -n thumb-drive-launcher/launcher/*.vbs dist/linux/launcher/ 2>/dev/null || true
          [ -f thumb-drive-launcher/launcher/icon.ico ] && \
            cp thumb-drive-launcher/launcher/icon.ico dist/linux/launcher/ || true

          cp thumb-drive-launcher/autorun.inf dist/linux/
          cp thumb-drive-launcher/README.txt  dist/linux/

          # Make all shell scripts executable inside the archive
          chmod +x dist/linux/launcher/*.sh
          chmod +x dist/linux/app/filemanager/filemanager

      - name: Tar Linux package (preserves execute bits)
        run: |
          tar -czf dist/thumb-drive-launcher-linux.tar.gz -C dist/linux .

      - uses: actions/upload-artifact@v4
        with:
          name: thumb-drive-launcher-linux
          path: dist/thumb-drive-launcher-linux.tar.gz

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/thumb-drive-launcher-linux.tar.gz
