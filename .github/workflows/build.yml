name: Build Thumb Drive Launcher

on:
  push:
    branches: [main, master]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  # ── Windows build — produces filemanager.exe ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "django>=4.2" pyinstaller

      - name: Build filemanager.exe
        working-directory: thumb-drive-launcher/app/filemanager
        run: pyinstaller filemanager.spec --noconfirm

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: bin-windows
          path: thumb-drive-launcher/app/filemanager/dist/filemanager/

  # ── Universal package — Windows exe + Linux/ChromeOS Python source ─────────
  build-universal:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: bin-windows
          path: dist/bins/windows/

      - name: Assemble universal drive package
        run: |
          mkdir -p dist/drive/app/filemanager/windows
          mkdir -p dist/drive/launcher

          # Windows compiled binary
          cp -r dist/bins/windows/. dist/drive/app/filemanager/windows/

          # Django source (used directly on Linux/ChromeOS — no binary needed)
          cp -r thumb-drive-launcher/app/filemanager/browser    dist/drive/app/filemanager/
          cp -r thumb-drive-launcher/app/filemanager/filemanager dist/drive/app/filemanager/
          cp    thumb-drive-launcher/app/filemanager/manage.py   dist/drive/app/filemanager/
          cp    thumb-drive-launcher/app/filemanager/requirements.txt dist/drive/app/filemanager/

          # All launcher scripts
          cp thumb-drive-launcher/launcher/*.bat dist/drive/launcher/
          cp thumb-drive-launcher/launcher/*.sh  dist/drive/launcher/
          cp thumb-drive-launcher/launcher/*.vbs dist/drive/launcher/ 2>/dev/null || true
          [ -f thumb-drive-launcher/launcher/icon.ico ] && \
            cp thumb-drive-launcher/launcher/icon.ico dist/drive/launcher/ || true
          chmod +x dist/drive/launcher/*.sh

          cp thumb-drive-launcher/autorun.inf dist/drive/
          cp thumb-drive-launcher/README.txt  dist/drive/

      - name: Zip universal package
        run: |
          cd dist/drive
          zip -r ../thumb-drive-launcher-universal.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: thumb-drive-launcher-universal
          path: dist/thumb-drive-launcher-universal.zip

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/thumb-drive-launcher-universal.zip
