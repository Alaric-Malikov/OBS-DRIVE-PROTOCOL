kind = "web"
previewPath = "/"
title = "Drive File Manager Simulator"
version = "1.0.0"
id = "artifacts/drive-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26264

[services.development]
run = "pnpm --filter @workspace/drive-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/drive-simulator", "run", "build" ]
publicDir = "artifacts/drive-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26264"
BASE_PATH = "/"
